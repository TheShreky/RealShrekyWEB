<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shreky | Elite Cloud v11.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00f3ff; --accent: #7000ff; --bg: #010103; --glass: rgba(10, 15, 25, 0.9); }
        * { box-sizing: border-box; cursor: crosshair; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Assistant', sans-serif; overflow-x: hidden; }
        
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.2; }
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; }

        header { padding: 60px 20px 30px; text-align: center; }
        .glitch { font-family: 'Orbitron'; font-size: 5rem; font-weight: 900; letter-spacing: 12px; text-shadow: 0 0 20px var(--main); }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px 100px; }
        
        /* הסתרה כברירת מחדל של המכולות */
        .dynamic-sec { display: none; background: var(--glass); border: 1px solid rgba(0, 243, 255, 0.1); border-radius: 20px; padding: 30px; margin-bottom: 30px; backdrop-filter: blur(15px); }

        .section-title { font-family: 'Orbitron'; color: var(--main); font-size: 1rem; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        .section-title::after { content: ''; height: 1px; flex: 1; background: linear-gradient(90deg, var(--main), transparent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .item-card { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        
        /* Team Photo Style */
        .pfp-box { width: 80px; height: 80px; background: #000; border: 2px solid var(--main); border-radius: 50%; margin: 0 auto 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; box-shadow: 0 0 15px var(--main); }
        .pfp-box img { width: 100%; height: 100%; object-fit: cover; }

        .btn-link { padding: 12px 30px; border-radius: 10px; text-decoration: none; font-weight: 900; font-family: 'Orbitron'; font-size: 0.8rem; margin: 0 10px; display: inline-block; }
        .btn-discord { background: #5865F2; color: white; }
        .btn-roblox { background: white; color: black; }

        /* Admin */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050508; z-index: 100000; padding: 40px; direction: rtl; overflow-y: auto; }
        .p-input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: var(--main); border-radius: 8px; }
        .p-btn { width: 100%; padding: 15px; background: var(--main); color: black; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body onload="init()">

<div class="grid-overlay"></div>
<canvas id="canvas-bg"></canvas>

<header>
    <div class="glitch">shreky</div>
    <p style="color: var(--main); letter-spacing: 5px;">[ V11.3 CLOUD ]</p>
</header>

<div class="container">
    <div class="dynamic-sec" id="project-sec" style="display: block;">
        <h2 class="section-title">ACTIVE_TASK</h2>
        <h3 id="p-title" style="margin: 0; font-family: 'Orbitron';">Syncing...</h3>
        <p>PROGRESS: <span id="p-percent" style="color: var(--main);">0%</span></p>
    </div>

    <div class="dynamic-sec" id="assets-sec">
        <h2 class="section-title">PROJECT_ARCHIVE</h2>
        <div class="grid" id="assets-list"></div>
    </div>

    <div class="dynamic-sec" id="team-sec">
        <h2 class="section-title">OPERATORS</h2>
        <div class="grid" id="team-list"></div>
    </div>

    <center style="margin-top: 40px;">
        <a href="https://discord.com/users/1251423970474065967" target="_blank" class="btn-link btn-discord">DISCORD</a>
        <a href="https://www.roblox.com/users/10023243514/profile" target="_blank" class="btn-link btn-roblox">ROBLOX</a>
    </center>
</div>

<div id="admin-panel">
    <h1 style="text-align:center; color:var(--main);">CONTROL CENTER</h1>
    <div style="max-width: 600px; margin: 0 auto;">
        <div class="item-card" style="margin-bottom: 20px;">
            <h3>👥 הוספת צוות</h3>
            <input type="text" id="t-name" class="p-input" placeholder="שם">
            <input type="text" id="t-role" class="p-input" placeholder="תפקיד">
            <input type="text" id="t-img" class="p-input" placeholder="לינק לתמונה (Discord/Imgur)">
            <button class="p-btn" onclick="addTeam()">הוסף לצוות</button>
        </div>
        <div class="item-card">
            <h3>📦 הוספת סקריפט</h3>
            <input type="text" id="a-name" class="p-input" placeholder="שם הסקריפט">
            <input type="text" id="a-url" class="p-input" placeholder="קישור">
            <button class="p-btn" onclick="addAsset()">הוסף סקריפט</button>
            <button class="p-btn" style="background:#ff4444;" onclick="clearDB()">איפוס נתונים (זהירות!)</button>
        </div>
    </div>
    <center><button class="p-btn" onclick="document.getElementById('admin-panel').style.display='none'" style="width:200px; margin-top:20px;">סגור</button></center>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpwCO_lBeob2ZyWq-zQJJGwwMhOvNFUW0",
        authDomain: "shrekystudio.firebaseapp.com",
        projectId: "shrekystudio",
        storageBucket: "shrekystudio.firebasestorage.app",
        databaseURL: "https://shrekystudio-default-rtdb.firebaseio.com",
        messagingSenderId: "201919135674",
        appId: "1:201919135674:web:fe7af0b2f00d6ff7662783"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // לוגיקת סנכרון צוות
    function addTeam() {
        const name = document.getElementById('t-name').value;
        const role = document.getElementById('t-role').value;
        const img = document.getElementById('t-img').value;
        if(name) db.ref('team').push({ name, role, img });
    }

    db.ref('team').on('value', snap => {
        const list = document.getElementById('team-list');
        const sec = document.getElementById('team-sec');
        list.innerHTML = "";
        if(snap.exists()) {
            sec.style.display = "block";
            snap.forEach(c => {
                const val = c.val();
                const avatar = val.img ? `<img src="${val.img}">` : val.name[0];
                list.innerHTML += `<div class="item-card"><div class="pfp-box">${avatar}</div><h4>${val.name}</h4><p>${val.role}</p></div>`;
            });
        } else { sec.style.display = "none"; }
    });

    // לוגיקת סנכרון סקריפטים
    function addAsset() {
        const name = document.getElementById('a-name').value;
        const url = document.getElementById('a-url').value;
        if(name) db.ref('assets').push({ name, url });
    }

    db.ref('assets').on('value', snap => {
        const list = document.getElementById('assets-list');
        const sec = document.getElementById('assets-sec');
        list.innerHTML = "";
        if(snap.exists()) {
            sec.style.display = "block";
            snap.forEach(c => {
                const val = c.val();
                list.innerHTML += `<div class="item-card"><h4>${val.name}</h4><a href="${val.url}" target="_blank" style="color:var(--main)">VIEW SOURCE</a></div>`;
            });
        } else { sec.style.display = "none"; }
    });

    function clearDB() { if(confirm("למחוק הכל?")) { db.ref('team').remove(); db.ref('assets').remove(); } }

    function init() {
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let p = []; for(let i=0; i<50; i++) p.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#00f3ff";
            p.forEach(dot => { dot.y -= 0.5; if(dot.y < 0) dot.y = canvas.height; ctx.beginPath(); ctx.arc(dot.x, dot.y, dot.s, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(draw);
        }
        draw();
    }
    document.addEventListener('keydown', e => { if(e.key === 'a' || e.key === 'A') { if(prompt("ACCESS:")==="678678678") document.getElementById('admin-panel').style.display='block'; } });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shreky | Elite Cloud Terminal v11.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Orbitron:wght@400;900&family=Courier+Prime&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00f3ff; --accent: #7000ff; --bg: #010103; --glass: rgba(10, 15, 25, 0.9); }
        * { box-sizing: border-box; cursor: crosshair; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Assistant', sans-serif; overflow-x: hidden; }
        
        /* Background Effects */
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.2; }
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; }

        #global-msg { 
            display: none; background: linear-gradient(90deg, transparent, var(--accent), var(--main), transparent); 
            color: white; text-align: center; padding: 15px; font-family: 'Orbitron'; 
            font-size: 0.9rem; font-weight: 900; position: sticky; top: 0; z-index: 2000; backdrop-filter: blur(5px);
        }

        header { padding: 80px 20px 40px; text-align: center; }
        .glitch { font-family: 'Orbitron'; font-size: 5.5rem; font-weight: 900; letter-spacing: 15px; text-shadow: 0 0 30px var(--main); color: white; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px 100px; }
        .glass-card { background: var(--glass); border: 1px solid rgba(0, 243, 255, 0.1); border-radius: 20px; padding: 30px; margin-bottom: 30px; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        .section-title { font-family: 'Orbitron'; color: var(--main); font-size: 1rem; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; letter-spacing: 3px; }
        .section-title::after { content: ''; height: 1px; flex: 1; background: linear-gradient(90deg, var(--main), transparent); }

        /* Pricing UI */
        .price-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .price-card { background: rgba(255,255,255,0.03); border: 1px solid #222; padding: 25px; border-radius: 15px; text-align: center; transition: 0.3s; }
        .price-card:hover { border-color: var(--main); transform: scale(1.02); background: rgba(0, 243, 255, 0.05); }
        .price-val { display: block; font-family: 'Orbitron'; font-size: 1.5rem; color: var(--main); margin-top: 10px; }

        /* Asset/Team Lists - Hidden by default */
        #assets-sec, #team-sec { display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .item-card { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        
        .pfp-box { width: 70px; height: 70px; background: #000; border: 2px solid var(--main); border-radius: 50%; margin: 0 auto 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 1.5rem; box-shadow: 0 0 15px var(--main); }
        .pfp-box img { width: 100%; height: 100%; object-fit: cover; }

        .links-bar { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
        .btn-link { padding: 15px 40px; border-radius: 12px; text-decoration: none; font-weight: 900; font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 2px; transition: 0.3s; }
        .btn-discord { background: #5865F2; color: white; box-shadow: 0 0 20px rgba(88, 101, 242, 0.4); }
        .btn-roblox { background: white; color: black; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
        .btn-link:hover { transform: translateY(-5px) scale(1.05); }

        /* Admin UI */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050508; z-index: 100000; padding: 40px; direction: rtl; overflow-y: auto; }
        .p-input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: var(--main); border-radius: 8px; }
        .p-btn { width: 100%; padding: 15px; background: var(--main); color: black; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body onload="init()">

<div id="global-msg"></div>
<div class="grid-overlay"></div>
<canvas id="canvas-bg"></canvas>

<header>
    <div class="glitch">shreky</div>
    <p style="color: var(--main); letter-spacing: 8px; font-family: 'Orbitron'; font-size: 0.8rem;">[ CORE_DATABASE_V11.2 ]</p>
</header>

<div class="container">
    
    <div class="glass-card">
        <h2 class="section-title">CURRENT_TASK</h2>
        <h3 id="p-title" style="margin: 0; font-family: 'Orbitron'; letter-spacing: 2px;">SYNCING WITH CLOUD...</h3>
        <div class="progress-wrap"><div id="p-bar-fill"></div></div>
        <p style="font-size: 0.8rem; opacity: 0.7;">COMPLETION: <span id="p-percent" style="color: var(--main);">0%</span></p>
    </div>

    <div class="glass-card">
        <h2 class="section-title">COMMISSION_RATES</h2>
        <div class="price-grid">
            <div class="price-card">
                <span style="color: #aaa; font-size: 0.7rem;">BASIC SCRIPT</span>
                <span class="price-val">R$ 100</span>
            </div>
            <div class="price-card">
                <span style="color: #aaa; font-size: 0.7rem;">ADVANCED SYSTEM</span>
                <span class="price-val">R$ 3,500</span>
            </div>
            <div class="price-card" style="border-color: var(--accent);">
                <span style="color: var(--accent); font-size: 0.7rem; font-weight: bold;">FULL GAME</span>
                <span class="price-val" style="color: white;">DM ONLY</span>
            </div>
        </div>
    </div>

    <div class="glass-card" id="assets-sec">
        <h2 class="section-title">PROJECT_ARCHIVE</h2>
        <div class="grid" id="assets-list"></div>
    </div>

    <div class="glass-card" id="team-sec">
        <h2 class="section-title">VERIFIED_OPERATORS</h2>
        <div class="grid" id="team-list"></div>
    </div>

    <div class="links-bar">
        <a href="https://discord.com/users/1251423970474065967" target="_blank" class="btn-link btn-discord">DISCORD</a>
        <a href="https://www.roblox.com/users/10023243514/profile" target="_blank" class="btn-link btn-roblox">ROBLOX</a>
    </div>
</div>

<div id="admin-panel">
    <h1 style="text-align:center; color:var(--main); font-family: 'Orbitron';">TERMINAL CONTROL</h1>
    <div style="max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="glass-card" style="display:block;">
            <h3>📢 הודעה ופרויקט</h3>
            <input type="text" id="set-msg" class="p-input" placeholder="הודעה גלובלית">
            <button class="p-btn" onclick="publishMsg()">שלח הודעה</button>
            <input type="text" id="set-p-name" class="p-input" placeholder="שם המשחק">
            <input type="number" id="set-p-val" class="p-input" placeholder="אחוז">
            <button class="p-btn" onclick="publishProject()">עדכן פרויקט</button>
        </div>
        <div class="glass-card" style="display:block;">
            <h3>👥 צוות וסקריפטים</h3>
            <input type="text" id="set-t-name" class="p-input" placeholder="שם איש צוות">
            <button class="p-btn" onclick="publishTeam()">הוסף צוות</button>
            <input type="text" id="set-a-name" class="p-input" placeholder="שם סקריפט">
            <input type="text" id="set-a-url" class="p-input" placeholder="לינק לקוד">
            <button class="p-btn" onclick="publishAsset()">הוסף סקריפט</button>
            <button class="p-btn" style="background:#ff4444;" onclick="clearAll()">אפס את כל הנתונים</button>
        </div>
    </div>
    <center><button class="p-btn" onclick="closeAdmin()" style="width:200px; background:#222; color:white;">סגור</button></center>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpwCO_lBeob2ZyWq-zQJJGwwMhOvNFUW0",
        authDomain: "shrekystudio.firebaseapp.com",
        projectId: "shrekystudio",
        storageBucket: "shrekystudio.firebasestorage.app",
        databaseURL: "https://shrekystudio-default-rtdb.firebaseio.com",
        messagingSenderId: "201919135674",
        appId: "1:201919135674:web:fe7af0b2f00d6ff7662783"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function publishMsg() { db.ref('announcement').set(document.getElementById('set-msg').value); }
    function publishProject() { db.ref('project').set({ name: document.getElementById('set-p-name').value, perc: document.getElementById('set-p-val').value }); }
    function publishTeam() { db.ref('team').push({ name: document.getElementById('set-t-name').value, role: 'Operator' }); }
    function publishAsset() { db.ref('assets').push({ name: document.getElementById('set-a-name').value, url: document.getElementById('set-a-url').value }); }
    function clearAll() { if(confirm("למחוק הכל?")) { db.ref('team').remove(); db.ref('assets').remove(); } }

    db.ref('announcement').on('value', snap => {
        const bar = document.getElementById('global-msg');
        bar.innerText = snap.val() || "";
        bar.style.display = snap.val() ? 'block' : 'none';
    });

    db.ref('project').on('value', snap => {
        const d = snap.val();
        if(d) {
            document.getElementById('p-title').innerText = d.name;
            document.getElementById('p-bar-fill').style.width = d.perc + "%";
            document.getElementById('p-percent').innerText = d.perc + "%";
        }
    });

    db.ref('team').on('value', snap => {
        const list = document.getElementById('team-list');
        const sec = document.getElementById('team-sec');
        list.innerHTML = "";
        if(snap.exists()) {
            sec.style.display = 'block';
            snap.forEach(c => {
                const m = c.val();
                list.innerHTML += `<div class="item-card"><div class="pfp-box">${m.name[0]}</div><h4>${m.name}</h4></div>`;
            });
        } else { sec.style.display = 'none'; }
    });

    db.ref('assets').on('value', snap => {
        const list = document.getElementById('assets-list');
        const sec = document.getElementById('assets-sec');
        list.innerHTML = "";
        if(snap.exists()) {
            sec.style.display = 'block';
            snap.forEach(c => {
                const a = c.val();
                list.innerHTML += `<div class="item-card"><h4>${a.name}</h4><a href="${a.url}" target="_blank" style="color:var(--main); font-size:0.7rem;">SOURCE</a></div>`;
            });
        } else { sec.style.display = 'none'; }
    });

    function init() {
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let p = []; for(let i=0; i<50; i++) p.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#00f3ff";
            p.forEach(dot => { dot.y -= 0.5; if(dot.y < 0) dot.y = canvas.height; ctx.beginPath(); ctx.arc(dot.x, dot.y, dot.s, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(draw);
        }
        draw();
    }
    document.addEventListener('keydown', e => { if(e.key === 'a' || e.key === 'A') document.getElementById('admin-panel').style.display = 'block'; });
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
</script>
</body>
</html>

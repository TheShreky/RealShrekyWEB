<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shreky | Elite Terminal v10.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Orbitron:wght@400;900&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00f3ff; --accent: #7000ff; --bg: #010103; --glass: rgba(10, 10, 15, 0.95); }
        * { box-sizing: border-box; cursor: crosshair; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Assistant', sans-serif; overflow-x: hidden; }
        
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.3; }
        
        /* Global Announcement Bar */
        #global-msg { 
            display: none; background: linear-gradient(90deg, var(--accent), var(--main)); 
            color: white; text-align: center; padding: 10px; font-family: 'Orbitron'; 
            font-size: 0.9rem; font-weight: 900; letter-spacing: 2px; box-shadow: 0 5px 15px rgba(0, 243, 255, 0.3);
            position: sticky; top: 0; z-index: 2000;
        }

        header { padding: 40px 20px 20px; text-align: center; }
        .glitch { font-family: 'Orbitron'; font-size: 5rem; font-weight: 900; letter-spacing: 12px; text-shadow: 0 0 20px var(--main); text-transform: uppercase; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 0 40px 100px; }
        .glass-card { background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 25px; padding: 35px; margin-bottom: 25px; backdrop-filter: blur(10px); }

        .section-title { font-family: 'Orbitron'; color: var(--main); font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; letter-spacing: 2px; }
        .section-title::after { content: ''; height: 1px; flex: 1; background: linear-gradient(90deg, var(--main), transparent); }

        /* Progress Bar */
        .progress-wrap { background: #000; height: 12px; border-radius: 20px; margin: 15px 0; border: 1px solid #222; overflow: hidden; }
        #p-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--main)); width: 0%; transition: 1.5s; }

        /* Scripts Grid */
        #assets-sec { display: none; }
        .assets-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .asset-card { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; border: 1px solid #222; transition: 0.3s; text-align: center; }
        .view-btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background: var(--main); color: black; text-decoration: none; border-radius: 10px; font-family: 'Orbitron'; font-size: 0.75rem; font-weight: 900; }

        /* Team */
        #team-sec { display: none; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .member-box { background: rgba(0, 243, 255, 0.02); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid rgba(0, 243, 255, 0.2); }
        .pfp-box { width: 80px; height: 80px; background: #000; border: 2px solid var(--main); border-radius: 50%; margin: 0 auto 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 1.5rem; }
        .pfp-box img { width: 100%; height: 100%; object-fit: cover; }

        .links-bar { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-link { padding: 15px 30px; border-radius: 12px; text-decoration: none; font-weight: 900; font-family: 'Orbitron'; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1); }
        .btn-discord { background: #5865F2; color: white; }
        .btn-roblox { background: white; color: black; }

        /* Admin UI */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050508; z-index: 100000; padding: 40px; direction: rtl; overflow-y: auto; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .p-input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: var(--main); border-radius: 8px; }
        .p-btn { width: 100%; padding: 15px; background: var(--main); color: black; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<div id="global-msg"></div>
<canvas id="canvas-bg"></canvas>

<header>
    <div class="glitch">shreky</div>
    <p style="color: var(--main); letter-spacing: 5px;">[ SYSTEM v10.8 ]</p>
</header>

<div class="container">
    <div class="glass-card">
        <h2 class="section-title">ACTIVE_TASK</h2>
        <h3 id="p-title" style="margin: 0; font-family: 'Orbitron';">System Awaiting Setup...</h3>
        <div class="progress-wrap"><div id="p-bar-fill"></div></div>
        <p>PROGRESS: <span id="p-percent" style="color: var(--main);">0%</span></p>
    </div>

    <div class="glass-card" id="assets-sec">
        <h2 class="section-title">PROJECT_ARCHIVE</h2>
        <div class="assets-grid" id="assets-list"></div>
    </div>

    <div class="glass-card" id="team-sec">
        <h2 class="section-title">OPERATORS</h2>
        <div class="team-grid" id="team-list"></div>
    </div>

    <div class="links-bar">
        <a href="https://discord.com/users/1251423970474065967" target="_blank" class="btn-link btn-discord">DISCORD</a>
        <a href="https://www.roblox.com/users/10023243514/profile" target="_blank" class="btn-link btn-roblox">ROBLOX</a>
    </div>
</div>

<div id="admin-panel">
    <h1 style="text-align:center; color:var(--main);">TERMINAL_OVERRIDE</h1>
    <div class="admin-grid">
        <div class="glass-card" style="display:block; grid-column: span 2;">
            <h3>📢 הודעה גלובלית</h3>
            <input type="text" id="set-msg" class="p-input" placeholder="מה ההודעה שלך? (למשל: סיימנו את הפרויקט!)">
            <button class="p-btn" onclick="updateGlobalMsg()">פרסם הודעה</button>
        </div>
        <div class="glass-card" style="display:block;">
            <h3>🚀 ניהול פרויקט</h3>
            <input type="text" id="set-p-name" class="p-input" placeholder="שם המשחק">
            <input type="number" id="set-p-val" class="p-input" placeholder="אחוז (0-100)">
            <button class="p-btn" onclick="updateProject()">עדכן</button>
        </div>
        <div class="glass-card" style="display:block;">
            <h3>👥 הוספת צוות</h3>
            <input type="text" id="set-t-name" class="p-input" placeholder="שם">
            <input type="text" id="set-t-role" class="p-input" placeholder="תפקיד">
            <button class="p-btn" onclick="addMember()">הוסף צוות</button>
        </div>
        <div class="glass-card" style="display:block; grid-column: span 2;">
            <h3>📦 הוספת סקריפט</h3>
            <input type="text" id="set-a-name" class="p-input" placeholder="שם הסקריפט">
            <input type="text" id="set-a-url" class="p-input" placeholder="קישור לקוד">
            <button class="p-btn" onclick="addAsset()">הוסף לאתר</button>
        </div>
    </div>
    <center><button class="p-btn" onclick="closeAdmin()" style="width:200px; background:#222; color:white; margin-top:30px;">סגור פאנל</button></center>
</div>

<script>
    function init() {
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let p = [];
        for(let i=0; i<60; i++) p.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#00f3ff";
            p.forEach(dot => { dot.y -= 0.4; if(dot.y < 0) dot.y = canvas.height; ctx.beginPath(); ctx.arc(dot.x, dot.y, dot.s, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(draw);
        }
        draw();
    }

    document.addEventListener('keydown', (e) => { if(e.key === 'a' || e.key === 'A') openAdmin(); });
    function openAdmin() { if(prompt("CODE:") === "678678678") document.getElementById('admin-panel').style.display = 'block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    function updateGlobalMsg() {
        let m = document.getElementById('set-msg').value;
        let bar = document.getElementById('global-msg');
        if(m) { bar.innerText = m; bar.style.display = 'block'; }
        else { bar.style.display = 'none'; }
    }

    function updateProject() {
        let n = document.getElementById('set-p-name').value;
        let v = document.getElementById('set-p-val').value;
        if(n) document.getElementById('p-title').innerText = n;
        if(v) { document.getElementById('p-bar-fill').style.width = v + "%"; document.getElementById('p-percent').innerText = v + "%"; }
    }

    function addMember() {
        let n = document.getElementById('set-t-name').value;
        let r = document.getElementById('set-t-role').value;
        if(n) {
            document.getElementById('team-sec').style.display = 'block';
            let initial = n.charAt(0).toUpperCase();
            document.getElementById('team-list').innerHTML += `
                <div class="member-box"><div class="pfp-box">${initial}</div>
                <h4>${n}</h4><p style="color:var(--main); font-size:0.8rem;">${r}</p></div>`;
        }
    }

    function addAsset() {
        let n = document.getElementById('set-a-name').value;
        let u = document.getElementById('set-a-url').value || "#";
        if(n) {
            document.getElementById('assets-sec').style.display = 'block';
            document.getElementById('assets-list').innerHTML += `
                <div class="asset-card"><h4>${n}</h4><a href="${u}" target="_blank" class="view-btn">VIEW SOURCE</a></div>`;
        }
    }
</script>
</body>
</html>
